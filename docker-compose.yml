services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: org_structure
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "
        python manage.py makemigrations departments &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-test-key-change-in-production
      - POSTGRES_DB=org_structure
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy

  test:
    build: .
    command: >
      sh -c "
        python manage.py makemigrations departments &&
        python manage.py migrate &&
        python manage.py test departments --verbosity=2
      "
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-test-key-change-in-production
      - POSTGRES_DB=org_structure
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - testing

volumes:
  postgres_data: